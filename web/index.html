<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, viewport-fit=cover">
    <title>disinfo!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #2c2c2c;
        }

        h1 {
            color: #fff;
            text-align: center;
            font-family: monospace;
            font-size: 2em;
            margin: 0;
            padding: 1em;
        }

        img {
            /* padding: 2px; */
            margin: 5px auto;
            max-width: 100%;
            image-rendering: pixelated;
            filter: brightness(1.2) contrast(0.9);
            display: block;
            border-radius: 4px;
            border: 3px solid #0C161C;
            /* filter: url('#gamma'); */
        }

        .screens img {
            width: calc(128px * 1.4);
        }

        img[src=""] {
            display: none;
        }

        .remote_button {
            font-size: 20px;
            margin: 5px;
            min-width: 60px;
            min-height: 30px;
            touch-action: manipulation;
        }

        #controls {
            margin: auto;
            max-width: 300px;
            display: flex;
            gap: 5px;
        }

        .main {
            display: flex;
            flex-direction: column;
            justify-content: left;
            padding: 0 10px;
            max-width: 500px;
            margin: auto;
            align-items: center;
        }
    </style>
</head>
<body>
    <h1>disinfo!</h1>
    <div class="main">
        <div class="screens">
            <img src='' id='study'/>
            <img src='' id='salon'/>
        </div>
        <div id='controls'>
        </div>
    </div>

    <svg height="0">
        <filter id="gamma">
            <feComponentTransfer>
                <feFuncR type="gamma" exponent="0.85" amplitude="1.5" offset="0" />
                <feFuncG type="gamma" exponent="0.85" amplitude="1.5" offset="0" />
                <feFuncB type="gamma" exponent="0.85" amplitude="1.5" offset="0" />
            </feComponentTransfer>
        </filter>
    </svg>
    <script type="module">
        function toggleFullScreen(el) {
            if (!document.fullscreenElement) {
                el.requestFullscreen();
            } else {
                document.exitFullscreen?.();
            }
        }
        const screenEl = document.getElementById('screen');

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                toggleFullScreen(screenEl)
            }
        })

    </script>
    <script type="module">
        const WS_RETRY_DELAY = 2000;
        const FRAME_DELAY = 20
        const connect = function (endpoint, img_id) {
            const protocol = window.location.protocol === 'https:' ? 'wss' : 'ws';
            let ws = new WebSocket(`${protocol}://${window.location.host}/${endpoint}`);

            ws.onmessage = function (event) {
                const data = JSON.parse(event.data)
                document.getElementById(img_id).src = `data:image/png;base64,${data.img}`;
            };

            ws.onopen = function (event) {
                const interval = setInterval(function () {
                    if (ws.readyState === WebSocket.OPEN) {
                        ws.send({'_v': 'dit'});
                    }
                    if (ws.readyState === WebSocket.CLOSED) {
                        clearInterval(interval);
                    }
                }, FRAME_DELAY);
            };

            ws.onclose = function () {
                // Handle retries by recreating the connection to websocket.
                console.warn(`Disinfo connection lost. Retrying in ${WS_RETRY_DELAY / 1000}s.`)
                setTimeout(function () {
                    // We generate socket with a timeout to make sure server has time to recover.
                    ws = connect(endpoint, img_id);
                }, WS_RETRY_DELAY);
            }

            ws.onerror = function () {
                ws.close();
            }
        }
        connect('ws/distudy', 'study');
        connect('ws/disalon', 'salon');
    </script>
    <script type="module">
        import { h, Component, render } from 'https://esm.sh/preact@10';
        import { useState } from 'https://esm.sh/preact@10/hooks';
        import htm from 'https://esm.sh/htm@3';

        // Initialize htm with Preact
        const html = htm.bind(h);

        function RemoteButton(props) {
            const didClick = () => {
                fetch('/remote', {
                    method: 'POST',
                    body: JSON.stringify({
                        action: props.action,
                        payload: props.payload,
                    }),
                    headers: {
                        'Content-Type': 'application/json'
                    },
                }).then(() => {
                    console.log('Sent button press')
                })
            }
            return html`<button onClick=${didClick} class='remote_button'>${props.title || props.action}</button>`;
        }

        function StreamURL(props) {
            const [url, setUrl] = useState('')
            const didChange = e => setUrl(e.currentTarget.value)
            return html`<div>
                <div>
                    <input onChange=${didChange} name="link" autocomplete="stream-url" type="text"/>
                    <${RemoteButton} action="set_stream_url" payload=${{url}} />
                </div>
                <div>
                    <${RemoteButton} action="set_stream_url" payload=${{url: "http://10.0.1.207:1984/api/stream.mjpeg?src=limn3"}} title="limn-a" />
                    <${RemoteButton} action="set_stream_url" payload=${{url: "http://10.0.1.207:1984/api/stream.mjpeg?src=limn4"}} title="limn-b" />
                    <${RemoteButton} action="set_stream_url" payload=${{url: "http://10.0.1.207:1984/api/stream.mjpeg?src=x2d"}} title="x2d" />
                </div>
            </div>`
        }

        function TriggerButton(props) {
            const didClick = () => {
                fetch('/trigger', {
                    method: 'POST',
                    body: JSON.stringify({
                        endpoint: props.endpoint,
                    }),
                    headers: {
                        'Content-Type': 'application/json'
                    },
                }).then(() => {
                    console.log('Sent trigger')
                })
            }
            return html`<button onClick=${didClick} class='trigger_button'>${props.endpoint}</button>`;
        }


        function App(props) {
            return html`
                <div>
                    <${RemoteButton} action="up" />
                    <${RemoteButton} action="left" />
                    <${RemoteButton} action="right" />
                    <${RemoteButton} action="down" />
                    <${RemoteButton} action="show_metro" />
                    <${RemoteButton} action="show_twentytwo" />
                    <${RemoteButton} action="screencap" />
                </div>
                <div>
                    <${RemoteButton} action="show_sensors" />
                    <${RemoteButton} action="show_news" />
                    <${RemoteButton} action="motion_toggle" />
                    <${RemoteButton} action="show_fonts_credit" />
                    <${RemoteButton} action="show_printers" />
                </div>
                <div>
                    <${RemoteButton} action="show_stream" />
                    <${StreamURL}/>
                </div>`;
        }

        render(html`<${App} name="World" />`, document.getElementById('controls'));
    </script>
</body>
</html>
